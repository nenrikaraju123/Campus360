services:
  postgres:
    image: postgres:16-alpine
    container_name: campus360-postgres
    environment:
      POSTGRES_DB: campus360
      POSTGRES_USER: campus360
      POSTGRES_PASSWORD: campus360
    ports:
      - "5432:5432"
    volumes:
      - campus360_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campus360"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: campus360-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI -> http://localhost:8025

volumes:
  campus360_pgdata:
