spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/campus360
    username: postgres
    password: Root123
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

campus360:
  jwt:
    secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-0123456789-0123456789-abcd}
  mail:
    from: ${MAIL_FROM:}
