spring:
  datasource:
    url: jdbc:h2:mem:campus360;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  ai:
    openai:
      api-key: test-not-set

campus360:
  ai:
    enabled: false
  jwt:
    secret: test-only-secret-0123456789-0123456789-0123456789-abcdef
    access-token-minutes: 15
    refresh-token-days: 7
